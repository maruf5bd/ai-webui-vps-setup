# =============================================================================
# Apache Reverse Proxy config for ai.yourdomain.com → Docker port 3000
#
# cPanel/WHM: Place in WHM → Apache Configuration → Include Editor
# OR save to:
#   /etc/apache2/conf.d/userdata/ssl/2_4/CPANEL_USER/ai.yourdomain.com/proxy.conf
#
# Then rebuild: /scripts/rebuildhttpdconf && service httpd restart
# =============================================================================

<IfModule mod_proxy.c>
  ProxyRequests Off
  ProxyPreserveHost On

  ProxyPass        / http://127.0.0.1:3000/
  ProxyPassReverse / http://127.0.0.1:3000/

  # WebSocket support (required for Open WebUI)
  RewriteEngine On
  RewriteCond %{HTTP:Upgrade} websocket [NC]
  RewriteCond %{HTTP:Connection} upgrade [NC]
  RewriteRule ^/?(.*) "ws://127.0.0.1:3000/$1" [P,L]
</IfModule>
